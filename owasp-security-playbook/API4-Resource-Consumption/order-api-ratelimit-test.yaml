openapi: 3.0.1
info:
  title: Order-Aiden-RateLimit-Test
  description: API4 Unrestricted Resource Consumption 테스트 - Rate Limiting 및 리소스 제한 적용
  termsOfService: https://github.com/ibm-apiconnect/sample-orders-api
  contact:
    name: IBM Corporation
    url: https://www.ibm.com/products/api-connect
  version: 2.0.0-ratelimit
  x-ibm-name: ibm-sample-order-api-ratelimit
externalDocs:
  description: Github project for this API, containing source code and deployment pipeline
  url: https://github.com/ibm-apiconnect/sample-orders-api
servers:
  - url: /order
    x-internal: false
security:
  - clientID: []
paths:
  /{orderNumber}:
    get:
      summary: Retrieve the details of your order with rate limiting
      parameters:
        - name: orderNumber
          in: path
          description: >-
            Order number to lookup - you should find this in your confirmation
            e-mail
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order found successfully
          headers:
            X-RateLimit-Limit:
              description: Request limit per minute
              schema:
                type: integer
            X-RateLimit-Remaining:
              description: Remaining requests in current window
              schema:
                type: integer
            X-RateLimit-Reset:
              description: Time when rate limit resets (Unix timestamp)
              schema:
                type: integer
          content:
            application/json:
              schema:
                title: Order Details
                type: object
                properties:
                  order_number:
                    title: Order Number
                    type: string
                    example: ORD00989792
                  tracking_status:
                    title: Tracking Status
                    type: object
                    properties: {}
                  shipped_at:
                    title: Date Shipped
                    type: string
                    format: date-time
                  created_at:
                    title: Date Order Created
                    type: string
                    format: date-time
                  status:
                    title: Order Status
                    type: string
                    enum:
                      - SHIPPED
                      - PICKED
                      - PENDING
                      - DELIVERED
                  tracking_reference:
                    title: Tracking Reference
                    type: string
        '413':
          description: Payload Too Large
        '429':
          description: Too Many Requests - Rate limit exceeded
components:
  securitySchemes:
    clientID:
      type: apiKey
      name: X-IBM-Client-Id
      in: header
x-ibm-configuration:
  properties:
    target-url:
      value: >-
        https://sample-api.us-east-a.apiconnect.automation.ibm.com/orders/order/{orderNumber}
      description: URL of the proxy policy
      encoded: false
  cors:
    enabled: true
  gateway: datapower-api-gateway
  type: rest
  phase: realized
  enforced: true
  testable: true
  assembly:
    execute:
      # API4: Rate Limiting 체크
      - gatewayscript:
          version: 2.0.0
          title: RATE-LIMIT - Check Request Rate
          source: |
            // API4: Unrestricted Resource Consumption 방어
            // Rate Limiting 구현
            
            var clientId = context.get('request.headers.x-ibm-client-id') || 'anonymous';
            var currentTime = Date.now();
            var rateLimitKey = 'ratelimit:' + clientId;
            
            // Rate Limit 설정
            var RATE_LIMIT_MAX = 100;  // 분당 최대 요청 수
            var RATE_LIMIT_WINDOW = 60000;  // 1분 (밀리초)
            
            console.error('[RATE-LIMIT] Checking rate for client: ' + clientId);
            
            // 실제 환경에서는 Redis나 DataPower의 rate limit 정책 사용
            // 여기서는 헤더에 rate limit 정보 추가
            context.message.header.set('X-RateLimit-Limit', String(RATE_LIMIT_MAX));
            context.message.header.set('X-RateLimit-Remaining', '95');
            context.message.header.set('X-RateLimit-Reset', String(currentTime + RATE_LIMIT_WINDOW));
            
            // 시뮬레이션: 5% 확률로 rate limit 초과
            var random = Math.random();
            if (random < 0.05) {
              console.error('[RATE-LIMIT] Rate limit exceeded for client: ' + clientId);
              context.set('message.status.code', 429);
              context.set('message.body', {
                error: 'Too Many Requests',
                message: 'Rate limit exceeded. Please try again later.',
                retry_after: 60
              });
              context.message.header.set('Content-Type', 'application/json');
              context.message.header.set('Retry-After', '60');
              throw new Error('Rate limit exceeded');
            }
            
            console.error('[RATE-LIMIT] Request allowed for client: ' + clientId);
      # API4: 요청 크기 제한
      - gatewayscript:
          version: 2.0.0
          title: RESOURCE - Validate Request Size
          source: |
            // API4: 요청 크기 제한 (DoS 방어)
            
            var contentLength = context.get('request.headers.content-length');
            var MAX_PAYLOAD_SIZE = 1048576;  // 1MB
            
            if (contentLength) {
              var size = parseInt(contentLength);
              
              console.error('[RESOURCE-CHECK] Request size: ' + size + ' bytes');
              
              if (size > MAX_PAYLOAD_SIZE) {
                console.error('[RESOURCE-FAIL] Payload too large: ' + size + ' bytes');
                context.set('message.status.code', 413);
                context.set('message.body', {
                  error: 'Payload Too Large',
                  message: 'Request payload exceeds maximum allowed size of 1MB',
                  max_size: MAX_PAYLOAD_SIZE,
                  actual_size: size
                });
                context.message.header.set('Content-Type', 'application/json');
                throw new Error('Payload too large');
              }
            }
            
            console.error('[RESOURCE-CHECK] Request size validated');
      # API4: 타임아웃 설정
      - invoke:
          title: order lookup with timeout
          version: 2.0.0
          verb: keep
          target-url: $(target-url)
          follow-redirects: false
          timeout: 30
          parameter-control:
            type: blocklist
            values: []
          header-control:
            type: blocklist
            values: []
          inject-proxy-headers: true
          persistent-connection: true
          backend-type: json
          output: order
          description: >-
            Retrieves order data with 30 second timeout to prevent resource exhaustion
      - parse:
          version: 2.1.0
          title: parse response
          parse-settings-reference:
            default: apic-default-parsesettings
          input: order
          output: order
          description: >-
            Parse the JSON from the order fulfillment system so that the values
            can be used later in the flow.
      # API4: 응답 크기 제한
      - gatewayscript:
          version: 2.0.0
          title: RESOURCE - Validate Response Size
          source: |
            // API4: 응답 크기 제한
            
            var orderData = context.get('order.body');
            var MAX_RESPONSE_SIZE = 5242880;  // 5MB
            
            if (orderData) {
              var responseSize = JSON.stringify(orderData).length;
              
              console.error('[RESOURCE-CHECK] Response size: ' + responseSize + ' bytes');
              
              if (responseSize > MAX_RESPONSE_SIZE) {
                console.error('[RESOURCE-FAIL] Response too large: ' + responseSize + ' bytes');
                context.set('message.status.code', 500);
                context.set('message.body', {
                  error: 'Internal Server Error',
                  message: 'Response data exceeds maximum allowed size'
                });
                context.message.header.set('Content-Type', 'application/json');
                throw new Error('Response too large');
              }
            }
            
            console.error('[RESOURCE-CHECK] Response size validated');
      - map:
          version: 2.0.0
          title: map input to lambda
          inputs:
            input:
              schema:
                type: object
                properties:
                  delivery_method:
                    type: string
                    name: delivery_method
                  tracking_reference:
                    type: string
                    name: tracking_reference
              variable: order.body
          outputs:
            output:
              schema:
                type: object
                properties:
                  shipper:
                    type: string
                    name: shipper
                  reference:
                    type: string
                    name: reference
              variable: message.body
              content: application/json
          actions:
            - set: output.shipper
              from: input.delivery_method
            - set: output.reference
              from: input.tracking_reference
      # API4: Lambda 호출에도 타임아웃 적용
      - invoke:
          version: 2.2.0
          title: 'lambda: track shipment with timeout'
          backend-type: detect
          header-control:
            type: blocklist
            values: []
          parameter-control:
            type: allowlist
            values: []
          http-version: HTTP/1.1
          timeout: 30
          verb: POST
          chunked-uploads: true
          persistent-connection: true
          cache-response: protocol
          cache-ttl: 900
          stop-on-error: []
          websocket-upgrade: false
          target-url: >-
            https://plgej7e2skungmxzjakprvhe340qkrkl.lambda-url.us-east-1.on.aws/
          output: tracking
          graphql-send-type: detect
          description: >-
            Call lambda function with 30 second timeout to prevent resource exhaustion
      - map:
          version: 2.0.0
          title: combine data for response
          inputs:
            tracking:
              schema:
                type: object
                properties:
                  trackResponse:
                    type: object
                    name: trackResponse
                    properties:
                      shipment:
                        type: object
                        name: shipment
                        properties:
                          package:
                            type: object
                            name: package
                            properties:
                              activity:
                                type: array
                                name: activity
                                items:
                                  type: object
                                  properties:
                                    status:
                                      type: object
                                      name: status
              variable: tracking.body
            order:
              schema:
                type: object
                properties:
                  order_number:
                    type: string
                    name: order_number
                  created_at:
                    type: string
                    name: created_at
                  shipped_at:
                    type: string
                    name: shipped_at
                  status:
                    type: string
                    name: status
                  tracking_reference:
                    type: string
                    name: tracking_reference
              variable: order.body
          outputs:
            output:
              schema:
                type: object
                properties:
                  order_number:
                    type: string
                    name: order_number
                    maxLength: 50
                  status:
                    type: string
                    name: status
                    enum:
                      - SHIPPED
                      - PICKED
                      - PENDING
                      - DELIVERED
                  shipped_at:
                    type: string
                    name: shipped_at
                    format: date-time
                    maxLength: 50
                  tracking_reference:
                    type: string
                    name: tracking_reference
                    maxLength: 100
                  tracking_status:
                    type: object
                    name: tracking_status
                  created_at:
                    type: string
                    name: created_at
                    format: date-time
                    maxLength: 50
              variable: message.body
          actions:
            - set: output.order_number
              from: order.order_number
            - set: output.tracking_status
              from: tracking.trackResponse.shipment.package.activity.status
            - set: output.shipped_at
              from: order.shipped_at
            - set: output.tracking_reference
              from: order.tracking_reference
            - set: output.status
              from: order.status
            - set: output.created_at
              from: order.created_at
    catch:
      - errors:
          - ConnectionError
          - RuntimeError
          - TimeoutError
        execute:
          - gatewayscript:
              version: 2.0.0
              title: Handle Resource Errors
              source: |
                // 리소스 관련 에러 처리
                var errorMessage = context.get('error.message') || 'Resource limit exceeded';
                var errorName = context.get('error.name') || 'Error';
                
                console.error('[RESOURCE-ERROR] ' + errorName + ': ' + errorMessage);
                
                // 타임아웃 에러
                if (errorName === 'TimeoutError') {
                  context.set('message.status.code', 504);
                  context.set('message.body', {
                    error: 'Gateway Timeout',
                    message: 'Request timeout - operation took too long'
                  });
                } else {
                  context.set('message.status.code', 503);
                  context.set('message.body', {
                    error: 'Service Unavailable',
                    message: 'Resource temporarily unavailable'
                  });
                }
                
                context.message.header.set('Content-Type', 'application/json');
    finally: []
  activity-log:
    enabled: true
    success-content: activity
    error-content: payload
x-original-swagger-version: '2.0'

