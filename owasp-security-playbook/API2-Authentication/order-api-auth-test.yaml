openapi: 3.0.1
info:
  title: Order-Aiden-Auth-Test
  description: API2 Broken Authentication 테스트 - 강화된 인증 메커니즘 적용
  termsOfService: https://github.com/ibm-apiconnect/sample-orders-api
  contact:
    name: IBM Corporation
    url: https://www.ibm.com/products/api-connect
  version: 2.0.0-auth
  x-ibm-name: ibm-sample-order-api-auth
externalDocs:
  description: Github project for this API, containing source code and deployment pipeline
  url: https://github.com/ibm-apiconnect/sample-orders-api
servers:
  - url: /order
    x-internal: false
security:
  - clientID: []
  - oauth: []
paths:
  /{orderNumber}:
    get:
      summary: Retrieve the details of your order with enhanced authentication
      parameters:
        - name: orderNumber
          in: path
          description: >-
            Order number to lookup - you should find this in your confirmation
            e-mail
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order found successfully
          content:
            application/json:
              schema:
                title: Order Details
                type: object
                properties:
                  order_number:
                    title: Order Number
                    type: string
                    example: ORD00989792
                  tracking_status:
                    title: Tracking Status
                    type: object
                    properties: {}
                  shipped_at:
                    title: Date Shipped
                    type: string
                    format: date-time
                  created_at:
                    title: Date Order Created
                    type: string
                    format: date-time
                  status:
                    title: Order Status
                    type: string
                    enum:
                      - SHIPPED
                      - PICKED
                      - PENDING
                      - DELIVERED
                  tracking_reference:
                    title: Tracking Reference
                    type: string
        '401':
          description: Unauthorized - Invalid or missing authentication
        '429':
          description: Too Many Requests - Rate limit exceeded
components:
  securitySchemes:
    clientID:
      type: apiKey
      name: X-IBM-Client-Id
      in: header
    oauth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.example.com/oauth/token
          scopes:
            read:orders: Read order information
x-ibm-configuration:
  properties:
    target-url:
      value: >-
        https://sample-api.us-east-a.apiconnect.automation.ibm.com/orders/order/{orderNumber}
      description: URL of the proxy policy
      encoded: false
  cors:
    enabled: true
  gateway: datapower-api-gateway
  type: rest
  phase: realized
  enforced: true
  testable: true
  assembly:
    execute:
      # API2: 인증 강화 - Client ID 검증
      - gatewayscript:
          version: 2.0.0
          title: AUTH - Validate Client ID
          source: |
            // API2: Broken Authentication 방어
            // 1. Client ID 존재 여부 확인
            // 2. Client ID 형식 검증
            // 3. Rate limiting을 위한 클라이언트 식별
            
            var clientId = context.get('request.headers.x-ibm-client-id');
            var authorization = context.get('request.headers.authorization');
            
            console.error('[AUTH-CHECK] Starting authentication validation');
            
            // Client ID 검증
            if (!clientId || clientId.trim() === '') {
              console.error('[AUTH-FAIL] Missing or empty Client ID');
              context.set('message.status.code', 401);
              context.set('message.body', {
                error: 'Unauthorized',
                message: 'Client ID is required'
              });
              context.message.header.set('Content-Type', 'application/json');
              // throw를 사용하여 플로우 중단
              throw new Error('Missing Client ID');
            }
            
            // Client ID 형식 검증 (영숫자, 하이픈, 언더스코어만 허용)
            var validClientIdPattern = /^[a-zA-Z0-9_-]+$/;
            if (!validClientIdPattern.test(clientId)) {
              console.error('[AUTH-FAIL] Invalid Client ID format: ' + clientId);
              context.set('message.status.code', 401);
              context.set('message.body', {
                error: 'Unauthorized',
                message: 'Invalid Client ID format'
              });
              context.message.header.set('Content-Type', 'application/json');
              throw new Error('Invalid Client ID format');
            }
            
            // SQL Injection, XSS 패턴 감지
            var maliciousPatterns = [
              /(\%27)|(\')|(\-\-)|(\%23)|(#)/i,  // SQL Injection
              /<script|javascript:|onerror=/i,    // XSS
              /union.*select|insert.*into|delete.*from/i  // SQL commands
            ];
            
            for (var i = 0; i < maliciousPatterns.length; i++) {
              if (maliciousPatterns[i].test(clientId)) {
                console.error('[AUTH-FAIL] Malicious pattern detected in Client ID');
                context.set('message.status.code', 403);
                context.set('message.body', {
                  error: 'Forbidden',
                  message: 'Invalid authentication credentials'
                });
                context.message.header.set('Content-Type', 'application/json');
                throw new Error('Malicious pattern detected');
              }
            }
            
            // Client ID 길이 제한 (DoS 방어)
            if (clientId.length > 256) {
              console.error('[AUTH-FAIL] Client ID too long: ' + clientId.length);
              context.set('message.status.code', 401);
              context.set('message.body', {
                error: 'Unauthorized',
                message: 'Client ID exceeds maximum length'
              });
              context.message.header.set('Content-Type', 'application/json');
              throw new Error('Client ID too long');
            }
            
            console.error('[AUTH-SUCCESS] Client ID validated: ' + clientId);
            
            // 검증된 Client ID를 컨텍스트에 저장
            context.set('validated.client.id', clientId);
            context.message.header.set('X-Auth-Validated', 'true');
      # API2: Rate Limiting (Brute Force 방어)
      - gatewayscript:
          version: 2.0.0
          title: AUTH - Rate Limiting Check
          source: |
            // API2: Rate Limiting으로 Brute Force 공격 방어
            // 실제 환경에서는 Redis나 DataPower의 rate limit 정책 사용
            
            var clientId = context.get('validated.client.id');
            var currentTime = Date.now();
            
            // 헤더에 rate limit 정보 추가
            context.message.header.set('X-RateLimit-Limit', '100');
            context.message.header.set('X-RateLimit-Remaining', '99');
            context.message.header.set('X-RateLimit-Reset', String(currentTime + 60000));
            
            console.error('[RATE-LIMIT] Client: ' + clientId + ', Time: ' + currentTime);
            
            // 실제 구현에서는 여기서 rate limit 체크
            // 예: 분당 100회 제한
      - invoke:
          title: order lookup
          version: 2.0.0
          verb: keep
          target-url: $(target-url)
          follow-redirects: false
          timeout: 60
          parameter-control:
            type: blocklist
            values: []
          header-control:
            type: blocklist
            values: []
          inject-proxy-headers: true
          persistent-connection: true
          backend-type: json
          output: order
          description: >-
            Retrieves order data from the fulfillment system using the key of
            the provided order number.
      - parse:
          version: 2.1.0
          title: parse response
          parse-settings-reference:
            default: apic-default-parsesettings
          input: order
          output: order
          description: >-
            Parse the JSON from the order fulfillment system so that the values
            can be used later in the flow.
      - map:
          version: 2.0.0
          title: map input to lambda
          inputs:
            input:
              schema:
                type: object
                properties:
                  delivery_method:
                    type: string
                    name: delivery_method
                  tracking_reference:
                    type: string
                    name: tracking_reference
              variable: order.body
          outputs:
            output:
              schema:
                type: object
                properties:
                  shipper:
                    type: string
                    name: shipper
                  reference:
                    type: string
                    name: reference
              variable: message.body
              content: application/json
          actions:
            - set: output.shipper
              from: input.delivery_method
            - set: output.reference
              from: input.tracking_reference
      - invoke:
          version: 2.2.0
          title: 'lambda: track shipment'
          backend-type: detect
          header-control:
            type: blocklist
            values: []
          parameter-control:
            type: allowlist
            values: []
          http-version: HTTP/1.1
          timeout: 60
          verb: POST
          chunked-uploads: true
          persistent-connection: true
          cache-response: protocol
          cache-ttl: 900
          stop-on-error: []
          websocket-upgrade: false
          target-url: >-
            https://plgej7e2skungmxzjakprvhe340qkrkl.lambda-url.us-east-1.on.aws/
          output: tracking
          graphql-send-type: detect
          description: >-
            Call lambda function to look up the tracking for a  parcel with the
            associated shipping company.
      - map:
          version: 2.0.0
          title: combine data for response
          inputs:
            tracking:
              schema:
                type: object
                properties:
                  trackResponse:
                    type: object
                    name: trackResponse
                    properties:
                      shipment:
                        type: object
                        name: shipment
                        properties:
                          package:
                            type: object
                            name: package
                            properties:
                              activity:
                                type: array
                                name: activity
                                items:
                                  type: object
                                  properties:
                                    status:
                                      type: object
                                      name: status
              variable: tracking.body
            order:
              schema:
                type: object
                properties:
                  order_number:
                    type: string
                    name: order_number
                  created_at:
                    type: string
                    name: created_at
                  shipped_at:
                    type: string
                    name: shipped_at
                  status:
                    type: string
                    name: status
                  tracking_reference:
                    type: string
                    name: tracking_reference
              variable: order.body
          outputs:
            output:
              schema:
                type: object
                properties:
                  order_number:
                    type: string
                    name: order_number
                    maxLength: 50
                  status:
                    type: string
                    name: status
                    enum:
                      - SHIPPED
                      - PICKED
                      - PENDING
                      - DELIVERED
                  shipped_at:
                    type: string
                    name: shipped_at
                    format: date-time
                    maxLength: 50
                  tracking_reference:
                    type: string
                    name: tracking_reference
                    maxLength: 100
                  tracking_status:
                    type: object
                    name: tracking_status
                  created_at:
                    type: string
                    name: created_at
                    format: date-time
                    maxLength: 50
              variable: message.body
          actions:
            - set: output.order_number
              from: order.order_number
            - set: output.tracking_status
              from: tracking.trackResponse.shipment.package.activity.status
            - set: output.shipped_at
              from: order.shipped_at
            - set: output.tracking_reference
              from: order.tracking_reference
            - set: output.status
              from: order.status
            - set: output.created_at
              from: order.created_at
    catch:
      - errors:
          - ConnectionError
          - RuntimeError
        execute:
          - gatewayscript:
              version: 2.0.0
              title: Handle Authentication Errors
              source: |
                // 인증 에러 처리
                var errorMessage = context.get('error.message') || 'Authentication failed';
                
                console.error('[AUTH-ERROR] ' + errorMessage);
                
                context.set('message.status.code', 401);
                context.set('message.body', {
                  error: 'Unauthorized',
                  message: 'Authentication validation failed'
                });
                context.message.header.set('Content-Type', 'application/json');
    finally: []
  activity-log:
    enabled: true
    success-content: activity
    error-content: payload
x-original-swagger-version: '2.0'

