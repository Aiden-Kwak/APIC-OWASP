openapi: 3.0.1
info:
  title: Order-Aiden-SSRF-Test
  description: API7 Server Side Request Forgery 테스트 - URL 검증 및 SSRF 방어
  termsOfService: https://github.com/ibm-apiconnect/sample-orders-api
  contact:
    name: IBM Corporation
    url: https://www.ibm.com/products/api-connect
  version: 2.0.0-ssrf
  x-ibm-name: ibm-sample-order-api-ssrf
externalDocs:
  description: Github project for this API, containing source code and deployment pipeline
  url: https://github.com/ibm-apiconnect/sample-orders-api
servers:
  - url: /order
    x-internal: false
security:
  - clientID: []
paths:
  /{orderNumber}:
    get:
      summary: Retrieve the details of your order with SSRF protection
      parameters:
        - name: orderNumber
          in: path
          description: >-
            Order number to lookup - you should find this in your confirmation
            e-mail
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order found successfully
          content:
            application/json:
              schema:
                title: Order Details
                type: object
                properties:
                  order_number:
                    title: Order Number
                    type: string
                    example: ORD00989792
                  tracking_status:
                    title: Tracking Status
                    type: object
                    properties: {}
                  shipped_at:
                    title: Date Shipped
                    type: string
                    format: date-time
                  created_at:
                    title: Date Order Created
                    type: string
                    format: date-time
                  status:
                    title: Order Status
                    type: string
                    enum:
                      - SHIPPED
                      - PICKED
                      - PENDING
                      - DELIVERED
                  tracking_reference:
                    title: Tracking Reference
                    type: string
        '400':
          description: Bad Request - Invalid input
        '403':
          description: Forbidden - SSRF attempt detected
components:
  securitySchemes:
    clientID:
      type: apiKey
      name: X-IBM-Client-Id
      in: header
x-ibm-configuration:
  properties:
    target-url:
      value: >-
        https://sample-api.us-east-a.apiconnect.automation.ibm.com/orders/order/{orderNumber}
      description: URL of the proxy policy
      encoded: false
  cors:
    enabled: true
  gateway: datapower-api-gateway
  type: rest
  phase: realized
  enforced: true
  testable: true
  assembly:
    execute:
      # API7: SSRF 방어 - 입력 검증
      - gatewayscript:
          version: 2.0.0
          title: SSRF - Validate Input Parameters
          source: |
            // API7: SSRF (Server Side Request Forgery) 방어
            // 사용자 입력이 내부 URL 호출에 사용되지 않도록 검증
            
            var orderNumber = context.get('request.parameters.orderNumber');
            
            console.error('[SSRF-CHECK] Validating order number: ' + orderNumber);
            
            // 1. URL 인코딩된 문자 감지
            var urlEncodedPattern = /%[0-9a-fA-F]{2}/;
            if (urlEncodedPattern.test(orderNumber)) {
              console.error('[SSRF-FAIL] URL encoded characters detected');
              context.set('message.status.code', 400);
              context.set('message.body', {
                error: 'Bad Request',
                message: 'Invalid order number format'
              });
              context.message.header.set('Content-Type', 'application/json');
              throw new Error('URL encoded characters not allowed');
            }
            
            // 2. URL 스키마 감지 (http://, https://, file://, ftp:// 등)
            var urlSchemePattern = /^[a-zA-Z][a-zA-Z0-9+.-]*:\/\//;
            if (urlSchemePattern.test(orderNumber)) {
              console.error('[SSRF-FAIL] URL scheme detected in order number');
              context.set('message.status.code', 403);
              context.set('message.body', {
                error: 'Forbidden',
                message: 'SSRF attempt detected - URL schemes not allowed'
              });
              context.message.header.set('Content-Type', 'application/json');
              throw new Error('SSRF attempt detected');
            }
            
            // 3. IP 주소 감지 (내부 네트워크 접근 시도)
            var ipPattern = /\b(?:\d{1,3}\.){3}\d{1,3}\b/;
            if (ipPattern.test(orderNumber)) {
              console.error('[SSRF-FAIL] IP address detected in order number');
              context.set('message.status.code', 403);
              context.set('message.body', {
                error: 'Forbidden',
                message: 'SSRF attempt detected - IP addresses not allowed'
              });
              context.message.header.set('Content-Type', 'application/json');
              throw new Error('SSRF attempt detected');
            }
            
            // 4. 특수 문자 및 경로 탐색 시도 감지
            var pathTraversalPattern = /\.\.|\/\.|\\|%2e%2e|%2f|%5c/i;
            if (pathTraversalPattern.test(orderNumber)) {
              console.error('[SSRF-FAIL] Path traversal attempt detected');
              context.set('message.status.code', 403);
              context.set('message.body', {
                error: 'Forbidden',
                message: 'SSRF attempt detected - Path traversal not allowed'
              });
              context.message.header.set('Content-Type', 'application/json');
              throw new Error('Path traversal detected');
            }
            
            // 5. localhost, 127.0.0.1, 내부 IP 대역 감지
            var internalHostPattern = /localhost|127\.0\.0\.1|0\.0\.0\.0|10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\./i;
            if (internalHostPattern.test(orderNumber)) {
              console.error('[SSRF-FAIL] Internal host reference detected');
              context.set('message.status.code', 403);
              context.set('message.body', {
                error: 'Forbidden',
                message: 'SSRF attempt detected - Internal hosts not allowed'
              });
              context.message.header.set('Content-Type', 'application/json');
              throw new Error('Internal host reference detected');
            }
            
            // 6. 허용된 형식 검증 (영숫자와 하이픈만)
            var validOrderPattern = /^[A-Z0-9-]+$/;
            if (!validOrderPattern.test(orderNumber)) {
              console.error('[SSRF-FAIL] Invalid characters in order number');
              context.set('message.status.code', 400);
              context.set('message.body', {
                error: 'Bad Request',
                message: 'Order number must contain only alphanumeric characters and hyphens'
              });
              context.message.header.set('Content-Type', 'application/json');
              throw new Error('Invalid order number format');
            }
            
            console.error('[SSRF-SUCCESS] Order number validated: ' + orderNumber);
            context.set('validated.order.number', orderNumber);
      # API7: URL 화이트리스트 검증
      - gatewayscript:
          version: 2.0.0
          title: SSRF - Validate Target URL
          source: |
            // API7: 백엔드 URL 화이트리스트 검증
            
            var targetUrl = 'https://sample-api.us-east-a.apiconnect.automation.ibm.com';
            
            // 허용된 도메인 목록
            var allowedDomains = [
              'sample-api.us-east-a.apiconnect.automation.ibm.com',
              'plgej7e2skungmxzjakprvhe340qkrkl.lambda-url.us-east-1.on.aws'
            ];
            
            console.error('[SSRF-CHECK] Validating target URL: ' + targetUrl);
            
            // URL에서 호스트 추출
            var urlMatch = targetUrl.match(/^https?:\/\/([^\/]+)/);
            if (urlMatch) {
              var host = urlMatch[1];
              var isAllowed = false;
              
              for (var i = 0; i < allowedDomains.length; i++) {
                if (host === allowedDomains[i]) {
                  isAllowed = true;
                  break;
                }
              }
              
              if (!isAllowed) {
                console.error('[SSRF-FAIL] Target URL not in whitelist: ' + host);
                context.set('message.status.code', 403);
                context.set('message.body', {
                  error: 'Forbidden',
                  message: 'Target URL not allowed'
                });
                context.message.header.set('Content-Type', 'application/json');
                throw new Error('Target URL not whitelisted');
              }
              
              console.error('[SSRF-SUCCESS] Target URL validated: ' + host);
            }
      - invoke:
          title: order lookup
          version: 2.0.0
          verb: keep
          target-url: $(target-url)
          follow-redirects: false
          timeout: 60
          parameter-control:
            type: blocklist
            values: []
          header-control:
            type: blocklist
            values: []
          inject-proxy-headers: true
          persistent-connection: true
          backend-type: json
          output: order
          description: >-
            Retrieves order data from validated and whitelisted URL only
      - parse:
          version: 2.1.0
          title: parse response
          parse-settings-reference:
            default: apic-default-parsesettings
          input: order
          output: order
          description: >-
            Parse the JSON from the order fulfillment system so that the values
            can be used later in the flow.
      - map:
          version: 2.0.0
          title: map input to lambda
          inputs:
            input:
              schema:
                type: object
                properties:
                  delivery_method:
                    type: string
                    name: delivery_method
                  tracking_reference:
                    type: string
                    name: tracking_reference
              variable: order.body
          outputs:
            output:
              schema:
                type: object
                properties:
                  shipper:
                    type: string
                    name: shipper
                  reference:
                    type: string
                    name: reference
              variable: message.body
              content: application/json
          actions:
            - set: output.shipper
              from: input.delivery_method
            - set: output.reference
              from: input.tracking_reference
      # API7: Lambda URL도 화이트리스트 검증
      - invoke:
          version: 2.2.0
          title: 'lambda: track shipment (whitelisted)'
          backend-type: detect
          header-control:
            type: blocklist
            values: []
          parameter-control:
            type: allowlist
            values: []
          http-version: HTTP/1.1
          timeout: 60
          verb: POST
          chunked-uploads: true
          persistent-connection: true
          cache-response: protocol
          cache-ttl: 900
          stop-on-error: []
          websocket-upgrade: false
          target-url: >-
            https://plgej7e2skungmxzjakprvhe340qkrkl.lambda-url.us-east-1.on.aws/
          output: tracking
          graphql-send-type: detect
          description: >-
            Call whitelisted lambda function only - SSRF protected
      - map:
          version: 2.0.0
          title: combine data for response
          inputs:
            tracking:
              schema:
                type: object
                properties:
                  trackResponse:
                    type: object
                    name: trackResponse
                    properties:
                      shipment:
                        type: object
                        name: shipment
                        properties:
                          package:
                            type: object
                            name: package
                            properties:
                              activity:
                                type: array
                                name: activity
                                items:
                                  type: object
                                  properties:
                                    status:
                                      type: object
                                      name: status
              variable: tracking.body
            order:
              schema:
                type: object
                properties:
                  order_number:
                    type: string
                    name: order_number
                  created_at:
                    type: string
                    name: created_at
                  shipped_at:
                    type: string
                    name: shipped_at
                  status:
                    type: string
                    name: status
                  tracking_reference:
                    type: string
                    name: tracking_reference
              variable: order.body
          outputs:
            output:
              schema:
                type: object
                properties:
                  order_number:
                    type: string
                    name: order_number
                    maxLength: 50
                  status:
                    type: string
                    name: status
                    enum:
                      - SHIPPED
                      - PICKED
                      - PENDING
                      - DELIVERED
                  shipped_at:
                    type: string
                    name: shipped_at
                    format: date-time
                    maxLength: 50
                  tracking_reference:
                    type: string
                    name: tracking_reference
                    maxLength: 100
                  tracking_status:
                    type: object
                    name: tracking_status
                  created_at:
                    type: string
                    name: created_at
                    format: date-time
                    maxLength: 50
              variable: message.body
          actions:
            - set: output.order_number
              from: order.order_number
            - set: output.tracking_status
              from: tracking.trackResponse.shipment.package.activity.status
            - set: output.shipped_at
              from: order.shipped_at
            - set: output.tracking_reference
              from: order.tracking_reference
            - set: output.status
              from: order.status
            - set: output.created_at
              from: order.created_at
    catch:
      - errors:
          - ConnectionError
          - RuntimeError
        execute:
          - gatewayscript:
              version: 2.0.0
              title: Handle SSRF Errors
              source: |
                // SSRF 관련 에러 처리
                var errorMessage = context.get('error.message') || 'SSRF validation failed';
                
                console.error('[SSRF-ERROR] ' + errorMessage);
                
                context.set('message.status.code', 403);
                context.set('message.body', {
                  error: 'Forbidden',
                  message: 'Request blocked by security policy'
                });
                context.message.header.set('Content-Type', 'application/json');
    finally: []
  activity-log:
    enabled: true
    success-content: activity
    error-content: payload
x-original-swagger-version: '2.0'

