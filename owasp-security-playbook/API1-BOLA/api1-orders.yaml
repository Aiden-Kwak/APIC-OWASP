openapi: 3.0.1
info:
  title: Order API - BOLA Protection Test
  description: View and track your orders and deliveries with BOLA (Broken Object Level Authorization) protection.
  termsOfService: https://github.com/ibm-apiconnect/sample-orders-api
  contact:
    name: IBM Corporation
    url: https://www.ibm.com/products/api-connect
  version: 2.0.0
  x-ibm-name: ibm-sample-order-api-bola
externalDocs:
  description: "Github project for this API, containing source code and deployment\
    \ pipeline"
  url: https://github.com/ibm-apiconnect/sample-orders-api
servers:
- url: /order
security:
- clientID: []
paths:
  /{orderNumber}:
    get:
      summary: Retrieve the details of your order.
      parameters:
      - name: orderNumber
        in: path
        description: Order number to lookup - you should find this in your confirmation
          e-mail
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Order found successfully
          content:
            application/json:
              schema:
                title: Order Details
                type: object
                properties:
                  order_number:
                    title: Order Number
                    type: string
                    example: ORD00989792
                  tracking_status:
                    title: Tracking Status
                    type: object
                    properties: {}
                  shipped_at:
                    title: Date Shipped
                    type: string
                    format: date-time
                  created_at:
                    title: Date Order Created
                    type: string
                    format: date-time
                  status:
                    title: Order Status
                    type: string
                    enum:
                    - SHIPPED
                    - PICKED
                    - PENDING
                    - DELIVERED
                  tracking_reference:
                    title: Tracking Reference
                    type: string
components:
  securitySchemes:
    clientID:
      type: apiKey
      name: X-IBM-Client-Id
      in: header
x-ibm-configuration:
  properties:
    target-url:
      value: "https://sample-api.us-east-a.apiconnect.automation.ibm.com/orders/order/{orderNumber}"
      description: URL of the proxy policy
      encoded: false
  cors:
    enabled: true
  gateway: datapower-api-gateway
  type: rest
  phase: realized
  enforced: true
  testable: true
  assembly:
    execute:
    - gatewayscript:
        version: 2.0.0
        title: "BOLA Protection: Verify Order Ownership"
        source: |
          // API1: Broken Object Level Authorization (BOLA) Protection
          // Get the authenticated user ID from the request context
          var userId = context.get('request.headers.x-user-id');
          var orderNumber = context.get('request.parameters.orderNumber');
          
          // Log the access attempt for security monitoring
          console.error('BOLA Check - User: ' + userId + ', Order: ' + orderNumber);
          
          // For testing: Allow requests without X-User-Id but log warning
          // In PRODUCTION, uncomment the validation below to enforce authentication
          if (!userId) {
              console.error('WARNING: No X-User-Id header provided - BOLA protection bypassed for testing');
              userId = 'anonymous-test-user';
              // PRODUCTION CODE - Uncomment to enforce authentication:
              // context.reject('Unauthorized', 'User authentication required');
              // context.message.statusCode = 401;
          }
          
          // Store user context for downstream validation
          context.set('validated.user.id', userId);
          context.set('validated.order.number', orderNumber);
    - invoke:
        title: order lookup
        version: 2.0.0
        verb: keep
        target-url: $(target-url)
        follow-redirects: false
        timeout: 60
        parameter-control:
          type: blocklist
          values: []
        header-control:
          type: blocklist
          values: []
        inject-proxy-headers: true
        persistent-connection: true
        backend-type: json
        output: order
        description: Retrieves order data from the fulfillment system using the key
          of the provided order number.
    - parse:
        version: 2.1.0
        title: parse response
        parse-settings-reference:
          default: apic-default-parsesettings
        input: order
        output: order
        description: Parse the JSON from the order fulfillment system so that the
          values can be used later in the flow.
    - gatewayscript:
        version: 2.0.0
        title: "BOLA Validation: Verify Order Ownership"
        source: |
          // API1: BOLA - Validate order ownership after retrieving data
          // 동기적 처리를 위해 context.get 사용
          var userId = context.get('validated.user.id');
          var orderNumber = context.get('validated.order.number');
          
          // Parse된 order 데이터를 context에서 가져오기
          var orderData = context.get('order.body');
          
          console.error('BOLA Validation - User: ' + userId + ', Order: ' + orderNumber);
          console.error('Order Data: ' + JSON.stringify(orderData));
          
          // 주문 데이터 존재 여부 확인
          if (!orderData || !orderData.order_number) {
              console.error('BOLA Validation Failed - Order not found');
              context.reject('NotFound', 'Order not found');
              context.message.statusCode = 404;
          }
          
          // PRODUCTION: 소유권 검증
          // 백엔드 API에 user_id 필드가 있다면 활성화
          // if (orderData.user_id && orderData.user_id !== userId) {
          //     console.error('BOLA Validation Failed - Access denied for user: ' + userId);
          //     context.reject('Forbidden', 'You do not have permission to access this order');
          //     context.message.statusCode = 403;
          // }
          
          console.error('BOLA Validation Passed - User: ' + userId + ' authorized for Order: ' + orderNumber);
    - map:
        version: 2.0.0
        title: map input to lambda
        inputs:
          input:
            schema:
              type: object
              properties:
                delivery_method:
                  type: string
                  name: delivery_method
                tracking_reference:
                  type: string
                  name: tracking_reference
            variable: order.body
        outputs:
          output:
            schema:
              type: object
              properties:
                shipper:
                  type: string
                  name: shipper
                reference:
                  type: string
                  name: reference
            variable: message.body
            content: application/json
        actions:
        - set: output.shipper
          from: input.delivery_method
        - set: output.reference
          from: input.tracking_reference
    - invoke:
        version: 2.2.0
        title: "lambda: track shipment"
        backend-type: detect
        header-control:
          type: blocklist
          values: []
        parameter-control:
          type: allowlist
          values: []
        http-version: HTTP/1.1
        timeout: 60
        verb: POST
        chunked-uploads: true
        persistent-connection: true
        cache-response: protocol
        cache-ttl: 900
        stop-on-error: []
        websocket-upgrade: false
        target-url: https://plgej7e2skungmxzjakprvhe340qkrkl.lambda-url.us-east-1.on.aws/
        output: tracking
        graphql-send-type: detect
        description: Call lambda function to look up the tracking for a  parcel with
          the associated shipping company.
    - map:
        version: 2.0.0
        title: combine data for response
        inputs:
          tracking:
            schema:
              type: object
              properties:
                trackResponse:
                  type: object
                  name: trackResponse
                  properties:
                    shipment:
                      type: object
                      name: shipment
                      properties:
                        package:
                          type: object
                          name: package
                          properties:
                            activity:
                              type: array
                              name: activity
                              items:
                                type: object
                                properties:
                                  status:
                                    type: object
                                    name: status
            variable: tracking.body
          order:
            schema:
              type: object
              properties:
                order_number:
                  type: string
                  name: order_number
                created_at:
                  type: string
                  name: created_at
                shipped_at:
                  type: string
                  name: shipped_at
                status:
                  type: string
                  name: status
                tracking_reference:
                  type: string
                  name: tracking_reference
            variable: order.body
        outputs:
          output:
            schema:
              type: object
              properties:
                order_number:
                  type: string
                  name: order_number
                status:
                  type: string
                  name: status
                shipped_at:
                  type: string
                  name: shipped_at
                tracking_reference:
                  type: string
                  name: tracking_reference
                tracking_status:
                  type: object
                  name: tracking_status
                created_at:
                  type: string
                  name: created_at
            variable: message.body
        actions:
        - set: output.order_number
          from: order.order_number
        - set: output.tracking_status
          from: tracking.trackResponse.shipment.package.activity.status
        - set: output.shipped_at
          from: order.shipped_at
        - set: output.tracking_reference
          from: order.tracking_reference
        - set: output.status
          from: order.status
        - set: output.created_at
          from: order.created_at
    finally: []
  activity-log:
    enabled: true
    success-content: activity
    error-content: payload
x-original-swagger-version: "2.0"

# Made with Bob
